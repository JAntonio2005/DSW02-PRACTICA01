spring:
  application:
    name: dsw02-practica01
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/empleadosdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html

app:
  security:
    admin-user: ${APP_ADMIN_USER:admin}
    admin-password: ${APP_ADMIN_PASSWORD:admin123}
    admin-role: ADMIN
